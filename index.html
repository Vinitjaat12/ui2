            --gold-dark: #8b6914;
            --gold-subtle: #b8943a;
            --accent-royal: #1a3a5c;
            --accent-sapphire: #1e4d8c;
            --accent-deep-blue: #0f2847;
            --text-primary: #f0ede8;
            --text-secondary: #c5c0b8;
            --text-muted: #8a857c;
            --text-gold: #d4b060;
            --white-soft: #f8f6f2;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(201, 160, 80, 0.3);
            --border-gold-bright: rgba(201, 160, 80, 0.5);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);

            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-2xl: 40px;

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            background-image:

                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(201, 160, 80, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 20% 20%, rgba(30, 77, 140, 0.35) 0%, transparent 60%);
            background-attachment: fixed;

        /* ═══════════════ SUBTLE TEXTURE OVERLAY ═══════════════ */

            background-size: 80px 80px;

        /* ═══════════════ AMBIENT LIGHT ORBS ═══════════════ */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.18;
        }
        .ambient-orb-1 {
            width: 500px;
            height: 500px;
            background: #1a3a5c;

            left: -120px;

        .ambient-orb-2 {

            height: 350px;

        /* ═══════════════ MAIN CONTAINER ═══════════════ */

        /* ═══════════════ TOP ORNAMENT LINE ═══════════════ */

            margin-bottom: 24px;
            width: 100%;

        .ornament-line {

            border-radius: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            opacity: 0.7;

        .ornament-diamond {
            width: 8px;
            height: 8px;

            transform: rotate(45deg);
            border-radius: 2px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(201, 160, 80, 0.5), 0 0 20px rgba(201, 160, 80, 0.25);

        /* ═══════════════ STATUS BADGE ═══════════════ */

            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(201, 160, 80, 0.08);
            border: 1px solid var(--border-gold);
            border-radius: 100px;
            padding: 8px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gold-primary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 18px;
            box-shadow: var(--shadow-gold);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold-bright);

        @keyframes gentlePulse {
            0%,

                opacity: 1;
                box-shadow: 0 0 8px rgba(224, 184, 96, 0.7), 0 0 16px rgba(201, 160, 80, 0.4);
            }
            50% {
                opacity: 0.6;
                box-shadow: 0 0 14px rgba(224, 184, 96, 0.9), 0 0 24px rgba(201, 160, 80, 0.55);
            }
        }

        /* ═══════════════ LOGO SECTION ═══════════════ */
        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        .logo-outer-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(201, 160, 80, 0.25);
            pointer-events: none;
            box-shadow: 0 0 30px rgba(201, 160, 80, 0.1), inset 0 0 30px rgba(201, 160, 80, 0.04);

        .logo-inner-ring {
            position: absolute;

            color: var(--gold-primary);
            flex-shrink: 0;
            letter-spacing: 0.2em;
        }

        /* ═══════════════ CARD - MAIN CTA ═══════════════ */
        .cta-card {
            width: 100%;
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 22px 20px 24px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(201, 160, 80, 0.06) inset;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .cta-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), var(--gold-light), var(--gold-primary), transparent);
            opacity: 0.7;
            border-radius: 2px 2px 0 0;
        }
        .cta-card:hover {
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(201, 160, 80, 0.12) inset, 0 0 50px rgba(201, 160, 80, 0.08);
            transform: translateY(-3px);
        }

        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            color: #fff;
            background: linear-gradient(160deg, #1e3a5f 0%, #162d4a 30%, #1a3555 60%, #0f2840 100%);
            border: 1.5px solid rgba(201, 160, 80, 0.4);
            box-shadow:
                var(--shadow-md),
                0 0 0 1px rgba(201, 160, 80, 0.15) inset,
                0 0 30px rgba(26, 58, 92, 0.3);
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.06) 0%,
                    transparent 40%,
                    transparent 100%);
            border-radius: var(--radius-md);
            pointer-events: none;
        }
        .cta-btn:hover {
            background: linear-gradient(160deg, #244a70 0%, #1a3555 30%, #1f3d60 60%, #122d44 100%);
            border-color: rgba(201, 160, 80, 0.6);
            box-shadow:
                var(--shadow-lg),
                0 0 0 1px rgba(201, 160, 80, 0.25) inset,
                0 0 50px rgba(26, 58, 92, 0.45),
                0 0 20px rgba(201, 160, 80, 0.2);
            transform: translateY(-3px);
        }
        .cta-btn:active {
            transform: translateY(0) scale(0.97);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(201, 160, 80, 0.2) inset;
        }
        .cta-btn .btn-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        .cta-btn .btn-text-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
            text-align: left;
        }
        .cta-btn .btn-text-main {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #ffffff;
        }
        .cta-btn .btn-text-sub {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--gold-light);
            text-transform: uppercase;
        }
        .cta-btn .btn-arrow {
            font-size: 1.1rem;
            flex-shrink: 0;
            color: var(--gold-primary);
            transition: transform 0.3s ease;
        }
        .cta-btn:hover .btn-arrow {
            transform: translateX(4px);
        }

        /* ═══════════════ TIMER CARD ═══════════════ */
        .timer-card {
            width: 100%;
            margin-top: 18px;
            padding: 20px 20px 22px;
            border-radius: var(--radius-lg);
            background: var(--surface-elevated);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(201, 160, 80, 0.04) inset;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 160, 80, 0.35), transparent);
            opacity: 0.6;
        }
        .timer-card.expired {
            border-color: rgba(180, 70, 50, 0.5);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(180, 70, 50, 0.08) inset, 0 0 30px rgba(180, 60, 40, 0.12);
        }
        .timer-card.expired::before {
            background: linear-gradient(90deg, transparent, rgba(200, 80, 60, 0.5), transparent);
        }

        .timer-label {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .timer-icon {
            display: inline-block;
            margin-right: 4px;
            color: var(--gold-primary);
        }
        .timer-display {
            display: block;
            font-family: 'Inter', 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0.06em;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
        }
        .timer-card.expired .timer-display {
            color: #e07050;
            text-shadow: 0 2px 12px rgba(180, 60, 40, 0.4);
        }
        .timer-progress-bar {
            width: 100%;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            margin-top: 12px;
            overflow: hidden;
        }
        .timer-progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright), var(--gold-light));
            transition: width 0.9s linear;
            box-shadow: 0 0 8px rgba(201, 160, 80, 0.4);
        }
        .timer-card.expired .timer-progress-fill {
            background: linear-gradient(90deg, #8b3a2a, #c05040);
            width: 0% !important;
            box-shadow: 0 0 8px rgba(200, 80, 60, 0.5);
        }
        .timer-note {
            margin-top: 10px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            font-weight: 500;
            transition: color 0.4s ease;
        }
        .timer-card.expired .timer-note {
            color: #d09080;
        }

            justify-content: center;
            gap: 14px;
            margin-top: 30px;
            flex-wrap: wrap;

        .stat-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 16px 16px;
            border-radius: var(--radius-md);
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            min-width: 75px;
            flex: 1;
            max-width: 110px;
            box-shadow: var(--shadow-sm);
            transition: all 0.35s ease;
            cursor: default;
        }
        .stat-card:hover {
            border-color: var(--border-gold);
            box-shadow: var(--shadow-md), 0 0 20px rgba(201, 160, 80, 0.08);
            transform: translateY(-3px);
            background: var(--surface-elevated);
        }
        .stat-value {
            font-family: 'Playfair Display', 'Poppins', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold-bright);
            letter-spacing: 0.02em;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        .stat-label {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ═══════════════ FOOTER ═══════════════ */
        .footer {
            margin-top: 34px;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;

        .footer a {

            transition: all 0.25s;

        .footer a:hover {
            color: var(--gold-bright);
            text-shadow: 0 0 8px rgba(201, 160, 80, 0.3);
        }
        .footer .credit {
            margin-top: 5px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ═══════════════ RESPONSIVE ═══════════════ */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 2rem;
            }
            .logo-img {
                width: 130px;
                height: 130px;
            }
            .logo-outer-ring {
                width: 170px;
                height: 170px;
            }
            .logo-inner-ring {
                width: 185px;
                height: 185px;
            }
            .logo-glow-bg {
                width: 145px;
                height: 145px;
            }
            .cta-btn {
                padding: 15px 18px;
                font-size: 0.8rem;
            }
            .cta-btn .btn-text-main {
                font-size: 0.9rem;
            }
            .timer-display {
                font-size: 2.4rem;
            }
            .stats-row {
                gap: 8px;
            }
            .stat-card {
                padding: 12px 10px;
                min-width: 60px;
                max-width: 90px;
            }
            .stat-value {
                font-size: 1.15rem;
            }
            .stat-label {
                font-size: 0.58rem;
            }
            .container {
                padding: 16px 14px 36px;
            }
        }

        /* ═══════════════ RIPPLE ═══════════════ */
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ═══════════════ SCROLLBAR ═══════════════ */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(201, 160, 80, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {

<script>
    // Updated Function: Pixel set aur track karega aur tabhi Chrome me redirect karega
    function forceChromeOnClick(event, targetUrl) {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = userAgent.indexOf('Instagram') > -1;
        var isAndroid = /android/i.test(userAgent);

        // 1. Sabse pehle Lead track karein (Normal clicks + Insta click dono ke liye)
        if (typeof fbq !== 'undefined') {
            fbq('track', 'Lead', { content_name: 'Captain Panel VIP Click' });
        }

        // 2. Agar user Android ke Instagram in-app browser par hai
        if (isInstagram && isAndroid) {
            event.preventDefault(); // Browser ke redirect ko temporary rokein
            var cleanUrl = targetUrl.replace(/^https?:\/\//, '');
            
            // 300ms ka safe delay taaki Pixel server tak track signal chala jaye
            setTimeout(function() {
                window.location.href = "intent://" + cleanUrl +
                    "#Intent;scheme=https;package=com.android.chrome;end;";
            }, 300);
        }
        // Normal web browsers ke liye bina roke sidhe href link par jaane dega aur upar track ho chuka hai.
    }

    // ═══════════════ COUNTDOWN TIMER ═══════════════
    (function() {
        const timerCard = document.getElementById('free-join-timer');
        const timerDisplay = document.getElementById('timer-display');
        const timerNote = document.getElementById('timer-note');
        const progressFill = document.getElementById('timer-progress-fill');

        if (!timerCard || !timerDisplay || !timerNote || !progressFill) return;

        const totalTime = 20;
        let timeLeft = totalTime;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateProgress() {
            const percentage = (timeLeft / totalTime) * 100;
            progressFill.style.width = percentage + '%';
            if (percentage < 25) {
                progressFill.style.background =
                'linear-gradient(90deg, #8b3a2a, #c05040, #d07050)';
                progressFill.style.boxShadow = '0 0 10px rgba(200,80,60,0.5)';
            } else if (percentage < 50) {
                progressFill.style.background =
                'linear-gradient(90deg, #8b6914, #c9a050, #d4b060)';
                progressFill.style.boxShadow = '0 0 8px rgba(201,160,80,0.35)';
            } else {
                progressFill.style.background =
                'linear-gradient(90deg, #8b6914, #c9a050, #e0b860)';
                progressFill.style.boxShadow = '0 0 8px rgba(201,160,80,0.4)';
            }
        }

        function renderTimer() {
            timerDisplay.textContent = formatTime(timeLeft);
            updateProgress();
        }

        renderTimer();

        const countdown = setInterval(() => {
            timeLeft -= 1;

            if (timeLeft <= 0) {
                timeLeft = 0;
                renderTimer();
                timerCard.classList.add('expired');
                timerNote.textContent = '⚠️ Free join expired! Register now before slots fill up.';
                clearInterval(countdown);
                return;
            }

            renderTimer();
        }, 1000);
    })();

    // ═══════════════ RIPPLE EFFECT ON BUTTONS ═══════════════
    document.querySelectorAll('.cta-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height) * 1.6;
            ripple.style.cssText = `
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            width: ${size}px;
            height: ${size}px;
            left: ${e.clientX - rect.left - size / 2}px;
            top: ${e.clientY - rect.top - size / 2}px;
            transform: scale(0);
            animation: rippleAnim 0.65s ease-out forwards;
            pointer-events: none;
            z-index: 10;
          `;
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });
    });

    // ═══════════════ SMOOTH STAT COUNTER ANIMATION ON SCROLL ═══════════════
    const statCards = document.querySelectorAll('.stat-card');
    const observerOptions = { threshold: 0.6 };
    const statObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, observerOptions);

    statCards.forEach(card => {
        card.style.opacity = '0.85';
        card.style.transform = 'translateY(8px)';
        card.style.transition = 'all 0.5s ease';
        statObserver.observe(card);
        setTimeout(() => {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, 100);
    });
</script>
